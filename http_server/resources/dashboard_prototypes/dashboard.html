        <style lang="CSS">
            :root {
                --gap: 10px;
            }
            * {
                box-sizing: border-box;
            }

            html, body {
                height: 100%;
                margin: 0px;
            }
            flex-cont {
                display: flex;
                flex-direction: column;

                height: 100%;
                
                justify-content: space-around;
                gap: var(--gap);
                padding: var(--gap);
            }
            flex-row {
                display: flex;
                flex-direction: row;

                justify-content: space-around;
                flex: 1;
                gap: var(--gap);
            }
            flex-box {
                display: flex;
                flex: 1;
            }
            display-box {
                display: flex;
                flex-direction: column;
                border-radius: 5px;
                flex: 1;
            }
            /* display-box:hover {
                background-color: #8b2d2d;
            } */
            title-row {
                display: flex;
                flex: 1;
                background-color: brown;
                color: white;
                align-items: center;
                justify-content: center;
                font-size: large;
            }
            content-box {
                display: flex;
                flex: 4;
                background-color: grey;
                color: black;
                align-items: center;
                justify-content: center;
                font-size: large;
            }
        </style>
    </head>
